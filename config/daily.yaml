quality:
  check_weekday_gaps: true
  enabled: true
  fail_on_error: false
run:
  lock_ttl_minutes: 120
  use_lock: true
source:
  type: akshare
  akshare_all_market: false
  akshare_limit: 30
  start_date: null
  end_date: null
  trade_date: null
storage:
  market_sqlite: research_store/market_data.sqlite3
