source:
  type: csv
  stocks: research_store/sample/stocks.csv
  bars: research_store/sample/daily_bar.cleaned.csv
  benchmark_bars:
  benchmark_code: equal_weight
  tushare_token:
  start_date:
  end_date:
  trade_date:

storage:
  market_sqlite: research_store/market_data.sqlite3
  paper_sqlite: research_store/paper_trading.sqlite3
  report_dir: research_store/reports
  output: research_store/reports/daily_summary.json

workflow:
  account_id: paper
  strategy: momentum_rank
  factor: momentum_60d
  horizon: 5
  quantiles: 5
  initial_cash: 1000000
  apply_fills: true

quality:
  enabled: true
  fail_on_error: false
  check_weekday_gaps: true

run:
  use_lock: true
  lock_ttl_minutes: 120
